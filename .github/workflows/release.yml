name: Release

on:
  push:
    tags:
      - "v*"

# Prevent concurrent releases if multiple tags are pushed rapidly.
concurrency:
  group: release
  cancel-in-progress: false      # Don't cancel an in-progress release

jobs:
  # No separate validate job — tags are always on main, which already passed CI.
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write            # Scoped to job, not workflow
      id-token: write            # Required for cosign keyless (OIDC) signing
    steps:
      # Pin actions to full SHA for supply-chain security.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26.x"

      - uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3

      - uses: anchore/sbom-action/download-syft@e11c554f704a0b820cbf8c51673f6945e0731532 # v0

      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          version: "v2.9.0"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
