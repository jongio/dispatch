name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Release type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26.x"

      - uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3

      - uses: anchore/sbom-action/download-syft@e11c554f704a0b820cbf8c51673f6945e0731532 # v0

      - name: Compute next version
        id: version
        run: |
          # Get the latest semver tag, default to v0.0.0 if none exists
          LATEST=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi

          # Strip the leading 'v'
          CURRENT="${LATEST#v}"

          # Split into major.minor.patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          # Bump based on input
          case "${{ inputs.bump }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "Bumping ${CURRENT} -> ${NEXT} (${{ inputs.bump }})"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Generate contributor notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          NEW_TAG="v${{ steps.version.outputs.version }}"

          # Generate release contributor notes
          if [ -n "$PREV_TAG" ]; then
            go run ./cmd/contributors/ --release "$PREV_TAG" "$NEW_TAG" > contrib-notes.md
          else
            go run ./cmd/contributors/ --release "" "$NEW_TAG" > contrib-notes.md
          fi

          # Update CONTRIBUTORS.md with all-time contributors
          go run ./cmd/contributors/ --all > CONTRIBUTORS.md

          # Commit updated CONTRIBUTORS.md if changed
          if ! git diff --quiet CONTRIBUTORS.md; then
            git add CONTRIBUTORS.md
            git commit -m "docs: update CONTRIBUTORS.md for $NEW_TAG"
            git push origin HEAD:main
          fi

      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          version: "v2.9.0"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add contributor notes to release
        if: hashFiles('contrib-notes.md') != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if [ -f contrib-notes.md ] && [ -s contrib-notes.md ]; then
            # Get current release body
            CURRENT_BODY=$(gh release view "$TAG" --json body --jq '.body')
            # Append contributor notes
            CONTRIB=$(cat contrib-notes.md)
            NEW_BODY="${CURRENT_BODY}

          ${CONTRIB}"
            gh release edit "$TAG" --notes "$NEW_BODY"
          fi

  pages:
    needs: release
    uses: ./.github/workflows/pages.yml
    permissions:
      contents: read
      pages: write
      id-token: write
