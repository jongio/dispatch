version: 2

builds:
  - main: ./cmd/dispatch
    binary: dispatch
    env:
      - CGO_ENABLED=0
    ldflags:
      - -X github.com/jongio/dispatch/internal/version.Version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: "dispatch_checksums.txt"
  algorithm: sha256

sboms:
  - artifacts: archive

signs:
  # Classic detached signature: produces ${artifact}.sig and ${artifact}.pem,
  # which install.sh and install.ps1 verify with
  # `cosign verify-blob --signature ...sig --certificate ...pem`. cosign is
  # pinned to the v2.x line in release.yml so this keeps working; cosign v3
  # forces the single-file bundle format instead.
  - cmd: cosign
    artifacts: checksum
    args:
      - "sign-blob"
      - "--yes"
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Performance
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^style:"
      - "^ci:"
      - "^test:"

release:
  draft: false
  prerelease: auto
  header: |
    ## Install

    **Linux / macOS:**
    ```bash
    curl -fsSL https://raw.githubusercontent.com/jongio/dispatch/main/install.sh | sh
    ```

    **Windows (PowerShell):**
    ```powershell
    irm https://raw.githubusercontent.com/jongio/dispatch/main/install.ps1 | iex
    ```

    **Install this specific version:**
    ```bash
    # Linux / macOS
    curl -fsSL https://raw.githubusercontent.com/jongio/dispatch/main/install.sh | sh -s -- {{ .Tag }}

    # Windows (PowerShell)
    $v="{{ .Tag }}"; irm https://raw.githubusercontent.com/jongio/dispatch/main/install.ps1 | iex
    ```
  footer: |
    ---

    **Full Changelog**: https://github.com/jongio/dispatch/compare/{{ .PreviousTag }}...{{ .Tag }}
