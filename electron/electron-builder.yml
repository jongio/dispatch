appId: com.jongio.dispatch
productName: Dispatch
copyright: Copyright © 2024-2026 Jon Gallant

directories:
  output: release

files:
  - dist/**/*
  - resources/**/*
  - "!node_modules/**/*"

win:
  target:
    - target: nsis
      arch: [x64, arm64]
  icon: resources/icon.ico

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: resources/icon.icns
  hardenedRuntime: true
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist

linux:
  target:
    - target: AppImage
      arch: [x64, arm64]
    - target: deb
      arch: [x64, arm64]
  icon: resources/icons
  category: Development

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

publish:
  provider: github
  owner: jongio
  repo: dispatch
