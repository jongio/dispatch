appId: com.jongio.dispatch
productName: Dispatch
copyright: Copyright © 2024-2026 Jon Gallant

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - "!node_modules/**/*"

win:
  target:
    - target: nsis
      arch: [x64, arm64]
  icon: build/icon.ico

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: build/icon.png
  hardenedRuntime: true

linux:
  target:
    - target: AppImage
      arch: [x64, arm64]
    - target: deb
      arch: [x64, arm64]
  icon: build/icon-256.png
  category: Development

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

publish:
  provider: github
  owner: jongio
  repo: dispatch
