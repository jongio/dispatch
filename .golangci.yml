version: "2"

run:
  timeout: 5m
  relative-path-mode: gomod

linters:
  default: standard
  enable:
    - errname
    - exhaustive
    - forcetypeassert
    - goconst
    - gocritic
    - makezero
    - nilerr
    - noctx
    - prealloc
    - predeclared
    - tparallel
    - unconvert
    - unparam
    - wastedassign
    # tenv: not available in golangci-lint v2.

  settings:
    goconst:
      min-len: 3
      min-occurrences: 3
    exhaustive:
      default-signifies-exhaustive: true
    gocritic:
      disabled-checks:
        # Stylistic: existing code uses if-else chains for clarity.
        - ifElseChain
        # False positive: args = append(baseArgs, ...) intentionally
        # creates a new slice rather than mutating baseArgs.
        - appendAssign
        # Stylistic: else { if ... } is sometimes clearer.
        - elseif

  exclusions:
    presets:
      - std-error-handling
    rules:
      # Test files: suppress noisy linters on test data/helpers.
      - path: _test\.go
        linters:
          - errcheck
          - goconst
          - unparam
          - forcetypeassert
          - noctx
          - exhaustive
          - prealloc
      # magefile is a build script with best-effort helpers.
      - path: magefile\.go
        linters:
          - unparam
          - errcheck
      # External library enum types — only a relevant subset is handled.
      - text: "missing cases in switch of type tea\\.Mouse"
        linters:
          - exhaustive
      - text: "missing cases in switch of type .*copilot\\.SessionEventType"
        linters:
          - exhaustive
      # runtime.GOOS comparisons are idiomatic Go, not magic strings.
      - text: 'string `(windows|darwin|linux)` has'
        linters:
          - goconst
      # os.Exit in main() is acceptable; defer cleanup is best-effort.
      - path: cmd/dispatch/main\.go
        text: exitAfterDefer
        linters:
          - gocritic
      # Database layer uses non-context sql methods by convention.
      # Migrating to context-aware variants is a separate refactor.
      - path: internal/data/
        linters:
          - noctx
      # Platform helpers call exec.Command without context for
      # OS-level operations (font installation, terminal detection).
      - path: internal/platform/
        linters:
          - noctx
